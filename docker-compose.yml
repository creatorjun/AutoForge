name: autoforge-stack

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoforge-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/autoforge
      - SPRING_DATASOURCE_USERNAME=autoforge_user
      - SPRING_DATASOURCE_PASSWORD=autoforge_pass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL_MS=900000
      - JWT_REFRESH_TTL_SEC=2592000
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AGENT_MAX_ITERATION=5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autoforge-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: autoforge-postgres
    environment:
      POSTGRES_DB: autoforge
      POSTGRES_USER: autoforge_user
      POSTGRES_PASSWORD: autoforge_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - autoforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoforge_user -d autoforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: autoforge-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - autoforge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  nginx:
    image: nginx:alpine
    container_name: autoforge-nginx
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - autoforge-network
    restart: always

networks:
  autoforge-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
